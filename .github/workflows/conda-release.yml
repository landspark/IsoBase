name: Python Package using Conda (rattler-build)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up rattler-build
      uses: prefix-dev/setup-rattler@v3

    - name: Extract Tag Version
      id: extract_tag
      run: |
        # Strip the 'v' prefix if present (e.g., v0.1.0 -> 0.1.0)
        TAG_NAME=${GITHUB_REF#refs/tags/}
        VERSION=${TAG_NAME#v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Build Conda Package
      run: |
        # Override the version variable in recipe.yaml using rattler-build's variant feature
        rattler-build build --recipe .conda/recipe.yaml --output-dir output_bld --variant-config <(echo "version: [\"${{ env.VERSION }}\"]")
        echo "Build completed. Artifacts:"
        ls -R output_bld

    - name: Add conda to system path
      run: |
        echo $CONDA/bin >> $GITHUB_PATH

    - name: Install Anaconda Client
      run: |
        conda install -y anaconda-client

    - name: Upload to Anaconda Cloud
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
      run: |
        anaconda upload output_bld/**/*.conda -u landspark --label main
